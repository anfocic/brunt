name: 'Brunt Review'
description: 'Adversarial AI code review. Finds bugs, generates failing tests as proof.'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  vectors:
    description: 'Comma-separated vectors to run (default: all)'
    required: false
    default: ''
  fail-on:
    description: 'Fail at this severity: low, medium, high, critical'
    required: false
    default: 'critical'
  provider:
    description: 'LLM provider: anthropic'
    required: false
    default: 'anthropic'
  generate-tests:
    description: 'Generate proof test files'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install Brunt
      shell: bash
      run: npm i -g brunt

    - name: Run Brunt
      shell: bash
      env:
        BRUNT_BASE_REF: ${{ github.base_ref }}
        BRUNT_PROVIDER: ${{ inputs.provider }}
        BRUNT_FAIL_ON: ${{ inputs.fail-on }}
        BRUNT_VECTORS: ${{ inputs.vectors }}
        BRUNT_GENERATE_TESTS: ${{ inputs.generate-tests }}
      run: |
        ARGS="--diff origin/${BRUNT_BASE_REF}..HEAD --provider ${BRUNT_PROVIDER} --fail-on ${BRUNT_FAIL_ON}"
        if [ -n "${BRUNT_VECTORS}" ]; then
          ARGS="${ARGS} --vectors ${BRUNT_VECTORS}"
        fi
        if [ "${BRUNT_GENERATE_TESTS}" != "true" ]; then
          ARGS="${ARGS} --no-tests"
        fi
        brunt scan ${ARGS}
