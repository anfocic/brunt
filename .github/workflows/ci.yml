name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Run tests
        run: bun test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Build
        run: bun run build

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < dist/cli.js)
          echo "Bundle size: ${SIZE} bytes ($(( SIZE / 1024 ))KB)"
          if [ "$SIZE" -gt 150000 ]; then
            echo "::error::Bundle exceeds 150KB limit (${SIZE} bytes)"
            exit 1
          fi

      - name: Verify built CLI
        run: node dist/cli.js help

  dogfood:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Build brunt
        run: bun run build

      - name: Brunt scans itself
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BRUNT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node dist/cli.js scan \
            --provider anthropic \
            --vectors correctness,security \
            --no-tests \
            --fail-on critical \
            --pr-comment \
            --no-cache
